name: Bug report
description: Report something that doesn't work as expected in Hermes
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill out the fields below as completely as you can — the more context, the faster the fix.

  - type: input
    id: hermes-version
    attributes:
      label: Hermes version
      placeholder: e.g. v0.1.0
    validations:
      required: true

  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
      placeholder: e.g. 2026.4.0
    validations:
      required: true

  - type: input
    id: browser-os
    attributes:
      label: Browser & OS
      placeholder: e.g. Chrome 130 on macOS 15, or HA companion app on iOS 18
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the dashboard
        2. ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Card YAML config
      description: Paste your card YAML.
      render: yaml

  - type: textarea
    id: console
    attributes:
      label: Browser console / HA logs
      description: Any errors or warnings you can see, redacted as needed.
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable.
