name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "24"
          cache: npm

      #npm ci is strict — fails if package-lock.json is out of sync.
      #We use npm install instead so a fresh checkout always builds.
      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Verify HACS-compatible artifact
        run: |
          if [ ! -f dist/hermes.js ]; then
            echo "::error::Expected dist/hermes.js not found — HACS will not be able to find the plugin"
            ls -la dist/ || true
            exit 1
          fi
          echo "::notice::Build artifact: $(stat -c%s dist/hermes.js) bytes"
